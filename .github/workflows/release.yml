name: Release

# Version scheme is 0.1.${{ github.run_number }} — github.run_number is
# GitHub Actions' monotonic per-workflow counter. It is stable across
# pushes as long as this workflow file keeps its path (.github/workflows/
# release.yml); renaming/replacing the file would reset the counter.

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# slop-cop links tree-sitter (CGo), so every target must build with
# CGO_ENABLED=1 and a C toolchain. linux/windows cross-compile from a single
# ubuntu runner via `zig cc` (zig bundles a full cross C toolchain and produces
# static musl Linux binaries); darwin builds natively on a macOS runner because
# zig does not ship the macOS SDK (Go's net package needs -lresolv there).
# FreeBSD is intentionally absent: go-tree-sitter has no freebsd support
# (parser.go references an undefined dupeFD), so it cannot build at all.
jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runs-on: ubuntu-latest
            cc: zig cc -target x86_64-linux-musl
          - goos: linux
            goarch: arm64
            runs-on: ubuntu-latest
            cc: zig cc -target aarch64-linux-musl
          - goos: windows
            goarch: amd64
            ext: .exe
            runs-on: ubuntu-latest
            cc: zig cc -target x86_64-windows-gnu
          - goos: windows
            goarch: arm64
            ext: .exe
            runs-on: ubuntu-latest
            cc: zig cc -target aarch64-windows-gnu
          - goos: darwin
            goarch: amd64
            runs-on: macos-latest
          - goos: darwin
            goarch: arm64
            runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Only the cross-compiled (linux/windows) rows carry a `cc`; darwin builds
      # with the runner's native clang.
      - name: Setup zig
        if: matrix.cc != ''
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          MATRIX_CC: ${{ matrix.cc }}
        shell: bash
        run: |
          if [ -n "$MATRIX_CC" ]; then
            export CC="$MATRIX_CC"
            export CXX="${MATRIX_CC/zig cc/zig c++}"
          fi
          version="0.1.${{ github.run_number }}"
          outdir="dist/slop-cop_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$outdir"
          go build -trimpath \
            -ldflags "-s -w \
              -X main.version=${version} \
              -X main.commit=${{ github.sha }}" \
            -o "$outdir/slop-cop${{ matrix.ext }}" \
            ./cmd/slop-cop
          cp LICENSE NOTICE README.md "$outdir/"

      - name: Package
        shell: bash
        run: |
          cd dist
          base="slop-cop_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -9 -r "${base}.zip" "${base}"
          else
            tar -czf "${base}.tar.gz" "${base}"
          fi
          # macOS runners lack sha256sum; fall back to shasum.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${base}".* > "${base}.sha256"
          else
            shasum -a 256 "${base}".* > "${base}.sha256"
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: slop-cop_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish v0.1.${{ github.run_number }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        shell: bash
        run: |
          cd dist
          ls -la
          cat *.sha256 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Derive version
        id: ver
        shell: bash
        run: |
          ver="0.1.${{ github.run_number }}"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=v$ver"    >> "$GITHUB_OUTPUT"

      - name: Publish ${{ steps.ver.outputs.tag }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          body: |
            Automated release from `main` at commit `${{ github.sha }}`.
            Build number: `${{ github.run_number }}`.

            Resolve the current binary without pinning via:
            `https://github.com/yasyf/slop-cop/releases/latest/download/slop-cop_<os>_<arch>.tar.gz`
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: 'true'
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true

      - name: Remove legacy mutable `latest` release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release delete latest --cleanup-tag --yes --repo ${{ github.repository }} 2>/dev/null || true
